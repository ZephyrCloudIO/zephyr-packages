name: On Pull Request
on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  ZE_FAIL_BUILD: true
  TURBO_TELEMETRY_DISABLED: 1
  # Base ref for `turbo --affected` comparisons. The fallback supports manual runs.
  TURBO_SCM_BASE: ${{ github.event.pull_request.base.sha || 'HEAD^1' }}

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Turbo's affected calculation needs the base commit locally.
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - name: run build affected
        env:
          ZE_IS_PREVIEW: true
          ZE_API: ${{ vars.ZE_API_DEV }}
          ZE_API_GATE: ${{ vars.ZE_API_GATE_DEV }}
          ZE_SECRET_TOKEN: ${{ secrets.ZE_SECRET_TOKEN }}
        # Deployments are side effects, so affected application builds must never be
        # satisfied from cache. A cache hit would skip upload and leave no e2e state.
        # Loose mode preserves GitHub's detached-HEAD metadata and the OS home
        # directory used by the authenticated Zephyr deployment store.
        run: pnpm exec turbo run build --affected --force --env-mode=loose --output-logs=new-only
      - name: run deployment e2e tests
        # Keep deployment records in-process. Persisted Zephyr state can include
        # credentials and must never be uploaded as a workflow artifact.
        run: pnpm exec turbo run e2e-test --filter=e2e-deployment --env-mode=loose --output-logs=new-only
      - name: Zephyr Preview Environments
        if: github.event_name == 'pull_request'
        # Pinned to the verified 2026-07-08 release commit.
        uses: ZephyrCloudIO/zephyr-preview-environment-action@a1b8399f877374d0cfc7f9badff1374c55cf070a
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - name: run build affected
        env:
          ZE_IS_PREVIEW: true
          ZE_API: ${{ vars.ZE_API_DEV }}
          ZE_API_GATE: ${{ vars.ZE_API_GATE_DEV }}
          ZE_SECRET_TOKEN: ${{ secrets.ZE_SECRET_TOKEN }}
        run: pnpm exec turbo run build --affected --force --env-mode=loose --output-logs=new-only
      - name: run deployment e2e tests
        run: pnpm exec turbo run e2e-test --filter=e2e-deployment --env-mode=loose --output-logs=new-only

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup
      - name: run lint
        run: pnpm lint
      - name: check formatting
        run: pnpm format:check
      - name: run project-reference typecheck
        run: pnpm typecheck

  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Turbo's affected calculation needs the base commit locally.
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - name: verify test inventory
        run: pnpm test:inventory
      - name: run test
        if: runner.os != 'Linux'
        run: pnpm test:affected
      - name: run complete test suite with coverage
        if: runner.os == 'Linux'
        run: pnpm test:coverage
      - name: verify publish archives and consumer entrypoints
        if: runner.os == 'Linux'
        run: pnpm verify:packages
      - name: upload coverage report
        if: runner.os == 'Linux' && always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: rstest-coverage
          path: coverage
          if-no-files-found: error
          retention-days: 14
