name: CI
on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  ZE_FAIL_BUILD: true
  TURBO_TELEMETRY_DISABLED: 1
  # Compare PRs with their base and main pushes with the previous main revision.
  # The fallback supports manual runs.
  TURBO_SCM_BASE: ${{ github.event.pull_request.base.sha || github.event.before || 'HEAD^1' }}

permissions:
  contents: read

jobs:
  build:
    name: End-to-end test of examples (ubuntu-latest)
    runs-on: depot-ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Turbo's affected calculation needs the base commit locally.
          fetch-depth: 0
      - uses: ./.github/actions/setup
        with:
          cache-key-suffix: e2e
      - name: run build affected
        env:
          ZE_IS_PREVIEW: true
          ZE_API: ${{ vars.ZE_API_DEV }}
          ZE_API_GATE: ${{ vars.ZE_API_GATE_DEV }}
          ZE_SECRET_TOKEN: ${{ secrets.ZE_SECRET_TOKEN }}
        # Deployments are side effects, so affected application builds must never be
        # satisfied from cache. A cache hit would skip upload and leave no e2e state.
        # Loose mode preserves GitHub's detached-HEAD metadata and the OS home
        # directory used by the authenticated Zephyr deployment store.
        run: pnpm exec turbo run build --affected --force --env-mode=loose --output-logs=errors-only
      - name: run deployment e2e tests
        # Keep deployment records in-process. Persisted Zephyr state can include
        # credentials and must never be uploaded as a workflow artifact.
        run: pnpm exec turbo run e2e-test --filter=e2e-deployment --env-mode=loose --output-logs=new-only
      - name: Zephyr Preview Environments
        if: github.event_name == 'pull_request'
        # Pinned to the verified 2026-07-08 release commit.
        uses: ZephyrCloudIO/zephyr-preview-environment-action@a1b8399f877374d0cfc7f9badff1374c55cf070a
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    name: End-to-end test of examples (windows-latest)
    # Modern.js/Rspack currently aborts with 0xC0000409 on Depot's Windows
    # Server 2025 image (`depot-windows-latest`). Pin the supported 2022 image.
    runs-on: depot-windows-2022
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      # Exclude hot paths from Windows Defender real-time scanning to reduce I/O
      # overhead during install and build. Silently skipped on images that restrict
      # Defender policy changes (continue-on-error keeps the rest of the job alive).
      - name: exclude workspace from Windows Defender
        shell: pwsh
        continue-on-error: true
        run: |
          $workspace = "${{ github.workspace }}"
          $pnpmStore = "$HOME\.pnpm-store"
          Add-MpPreference -ExclusionPath $workspace, $pnpmStore
      - uses: ./.github/actions/setup
        with:
          cache-key-suffix: e2e
      - name: run build affected
        env:
          ZE_IS_PREVIEW: true
          ZE_API: ${{ vars.ZE_API_DEV }}
          ZE_API_GATE: ${{ vars.ZE_API_GATE_DEV }}
          ZE_SECRET_TOKEN: ${{ secrets.ZE_SECRET_TOKEN }}
          # Run Parcel's bundler in single-process mode so the worker farm is
          # never spawned and process teardown is instant on Windows.
          PARCEL_WORKERS: 0
        # Rspack's NAPI-RS native Windows DLL keeps Rust/Tokio thread-pool
        # threads alive after each build subprocess finishes. The OS TCP SYN
        # retransmit timer (~520 s) is what finally kills the process. Whichever
        # Rspack-based task runs last (alone) blocks the entire turbo pipeline.
        #
        # Workaround: tee turbo's output to a temp file while streaming it live,
        # then use a 300-second timeout. If the timeout fires, check whether turbo
        # already printed its success summary — if yes, the stall was just a
        # lingering NAPI process and we exit 0; if not, a real build failure
        # occurred and we exit 1 to preserve the failure signal.
        shell: bash
        run: |
          set +e
          out=$(mktemp)
          timeout 180 pnpm exec turbo run build \
            --affected --force --env-mode=loose --output-logs=new-only \
            | tee "$out"
          rc=$?
          if [ $rc -eq 124 ]; then
            if grep -q "Tasks:.*successful" "$out"; then
              echo "Turbo tasks succeeded; lingering NAPI-RS process killed by timeout."
              exit 0
            else
              echo "Build timed out before completing."
              exit 1
            fi
          fi
          exit $rc
      - name: run deployment e2e tests
        run: pnpm exec turbo run e2e-test --filter=e2e-deployment --env-mode=loose --output-logs=new-only

  lint:
    runs-on: depot-ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup
        with:
          cache-key-suffix: lint
      - name: verify miniapp Wave 1 dependency policy
        run: pnpm test:miniapp-wave1
      - name: run lint
        run: pnpm lint
      - name: check formatting
        run: pnpm format:check
      - name: run project-reference typecheck
        run: pnpm typecheck

  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [depot-ubuntu-latest, depot-windows-2022]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Turbo's affected calculation needs the base commit locally.
          fetch-depth: 0
      - name: exclude workspace from Windows Defender
        if: runner.os == 'Windows'
        shell: pwsh
        continue-on-error: true
        run: |
          $workspace = "${{ github.workspace }}"
          $pnpmStore = "$HOME\.pnpm-store"
          Add-MpPreference -ExclusionPath $workspace, $pnpmStore
      - uses: ./.github/actions/setup
        with:
          cache-key-suffix: test
      - name: run test
        if: runner.os != 'Linux'
        run: pnpm test:affected
      - name: run complete test suite with coverage
        if: runner.os == 'Linux'
        run: pnpm test:coverage
      - name: upload coverage report
        if: runner.os == 'Linux' && always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rstest-coverage
          path: coverage
          if-no-files-found: error
          retention-days: 14
