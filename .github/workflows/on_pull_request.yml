name: On Pull Request
on:
  pull_request:
  workflow_dispatch:
    inputs:
      branch:
        description: on the main branch
        required: true
        default: 'main'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  ZE_FAIL_BUILD: true
  TURBO_TELEMETRY_DISABLED: 1
  # Depot runners inject the remote cache credentials.
  TURBO_CACHE: remote:rw
  # Base ref for `turbo --affected` / `turbo ls --affected` comparisons.
  TURBO_SCM_BASE: ${{ github.event.pull_request.base.sha || 'HEAD^1' }}

jobs:
  build:
    # All jobs run on Depot-managed runners; check names keep the plain OS label
    # because branch protection requires them by name.
    runs-on: ${{ matrix.os == 'ubuntu-latest' && 'depot-ubuntu-latest' || 'depot-windows-2022' }}
    timeout-minutes: 45
    permissions:
      contents: read
      pull-requests: write
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
        with:
          # We need all branches and commits so that turbo --affected has a base to compare against.
          fetch-depth: 0
      - uses: ./.github/actions/setup
      # Build plugins first to avoid race conditions on Windows
      - name: run build plugins
        env:
          ZE_IS_PREVIEW: true
          ZE_API: ${{ vars.ZE_API_DEV }}
          ZE_API_GATE: ${{ vars.ZE_API_GATE_DEV }}
          ZE_SECRET_TOKEN: ${{ secrets.ZE_SECRET_TOKEN }}
        run: pnpm exec turbo run build --filter='./libs/*' --output-logs=new-only
      - name: run build affected
        env:
          ZE_IS_PREVIEW: true
          ZE_API: ${{ vars.ZE_API_DEV }}
          ZE_API_GATE: ${{ vars.ZE_API_GATE_DEV }}
          ZE_SECRET_TOKEN: ${{ secrets.ZE_SECRET_TOKEN }}
        # Deploying is a side effect of example builds, so this step must never
        # be served from cache — a hit would skip the deploy and leave ~/.zephyr
        # empty for the e2e job (turbo cache does not restore ~/.zephyr).
        # --force skips cache reads (writes are harmless: the next run forces again).
        run: pnpm exec turbo run build --affected --force --output-logs=new-only
      - name: Set ZEPHYR_CACHE
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            echo "ZEPHYR_CACHE=$USERPROFILE\\.zephyr" >> $GITHUB_ENV
          else
            echo "ZEPHYR_CACHE=$HOME/.zephyr" >> $GITHUB_ENV
          fi
      - name: Check if cache has files
        id: check-cache
        shell: bash
        run: |
          if [ -d "${{ env.ZEPHYR_CACHE }}" ] && [ "$(ls -A "${{ env.ZEPHYR_CACHE }}" 2>/dev/null)" ]; then
            echo "has-files=true" >> $GITHUB_OUTPUT
          else
            echo "has-files=false" >> $GITHUB_OUTPUT
          fi
      - name: Upload built libs and cache
        if: steps.check-cache.outputs.has-files == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: zephyr-cache-${{ matrix.os }}
          path: ${{ env.ZEPHYR_CACHE }}
          retention-days: 7
          include-hidden-files: true
      - name: Zephyr Preview Environments
        # Run this only once per matrix build to avoid duplicate PR comments.
        if: runner.os == 'Linux'
        uses: ZephyrCloudIO/zephyr-preview-environment-action@main
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

  lint:
    runs-on: depot-ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: run lint
        run: pnpm lint
      - name: check formatting
        run: pnpm format:check

  test:
    # All jobs run on Depot-managed runners; check names keep the plain OS label
    # because branch protection requires them by name.
    runs-on: ${{ matrix.os == 'ubuntu-latest' && 'depot-ubuntu-latest' || 'depot-windows-2022' }}
    timeout-minutes: 30
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
        with:
          # We need all branches and commits so that turbo --affected has a base to compare against.
          fetch-depth: 0
      - uses: ./.github/actions/setup
        with:
          os: ${{ matrix.os }}
      - name: run test
        env:
          ZE_IS_PREVIEW: true
          ZE_API: ${{ vars.ZE_API_DEV }}
          ZE_API_GATE: ${{ vars.ZE_API_GATE_DEV }}
          ZE_SECRET_TOKEN: ${{ secrets.ZE_SECRET_TOKEN }}
        run: pnpm exec turbo run test --affected --output-logs=new-only

  e2e-test:
    # All jobs run on Depot-managed runners; check names keep the plain OS label
    # because branch protection requires them by name.
    runs-on: ${{ matrix.os == 'ubuntu-latest' && 'depot-ubuntu-latest' || 'depot-windows-2022' }}
    timeout-minutes: 45
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    name: End-to-end test of examples
    needs: build
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup
        with:
          os: ${{ matrix.os }}
      - name: Set ZEPHYR_CACHE
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            echo "ZEPHYR_CACHE=$USERPROFILE\\.zephyr" >> $GITHUB_ENV
          else
            echo "ZEPHYR_CACHE=$HOME/.zephyr" >> $GITHUB_ENV
          fi
      - name: Download zephyr cache
        id: download-zephyr-cache
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: zephyr-cache-${{ matrix.os }}
          path: ${{ env.ZEPHYR_CACHE }}
      - name: Check if cache has files
        id: check-cache
        shell: bash
        run: |
          if [ -d "${{ env.ZEPHYR_CACHE }}" ] && [ "$(ls -A "${{ env.ZEPHYR_CACHE }}" 2>/dev/null)" ]; then
            echo "has-files=true" >> $GITHUB_OUTPUT
          else
            echo "has-files=false" >> $GITHUB_OUTPUT
          fi
      - name: Skip e2e when no cache exists for this OS
        if: steps.check-cache.outputs.has-files != 'true'
        run: echo "No Zephyr cache artifact for ${{ matrix.os }}; skipping e2e examples test."
      - name: Run e2e examples test
        if: steps.check-cache.outputs.has-files == 'true'
        run: pnpm exec turbo run e2e-test --filter=e2e-deployment --force
