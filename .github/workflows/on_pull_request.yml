name: On Pull Request
on:
  pull_request:
  workflow_dispatch:
    inputs:
      branch:
        description: on the main branch
        required: true
        default: 'main'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  ZE_FAIL_BUILD: true
  NX_DAEMON: false

jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    permissions:
      contents: read
      pull-requests: write
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # We need to fetch all branches and commits so that Nx affected has a base to compare against.
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - uses: nrwl/nx-set-shas@3e9ad7370203c1e93d109be57f3b72eb0eb511b1 # v4
        with:
          main-branch-name: main
      # Build plugins first to avoid race conditions on Windows
      - name: run build plugins
        env:
          ZE_IS_PREVIEW: true
          ZE_API: ${{ vars.ZE_API_DEV }}
          ZE_API_GATE: ${{ vars.ZE_API_GATE_DEV }}
          ZE_SECRET_TOKEN: ${{ secrets.ZE_SECRET_TOKEN }}
        run: pnpm nx affected --exclude='!libs/**' -t build --skipRemoteCache --outputStyle=stream
      - name: run build affected
        env:
          ZE_IS_PREVIEW: true
          ZE_API: ${{ vars.ZE_API_DEV }}
          ZE_API_GATE: ${{ vars.ZE_API_GATE_DEV }}
          ZE_SECRET_TOKEN: ${{ secrets.ZE_SECRET_TOKEN }}
        run: pnpm nx affected -t build --skipRemoteCache --outputStyle=stream
      - name: Set ZEPHYR_CACHE
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            echo "ZEPHYR_CACHE=$USERPROFILE\\.zephyr" >> $GITHUB_ENV
          else
            echo "ZEPHYR_CACHE=$HOME/.zephyr" >> $GITHUB_ENV
          fi
      - name: Check if cache has files
        id: check-cache
        shell: bash
        run: |
          if [ -d "${{ env.ZEPHYR_CACHE }}" ] && [ "$(ls -A "${{ env.ZEPHYR_CACHE }}" 2>/dev/null)" ]; then
            echo "has-files=true" >> $GITHUB_OUTPUT
          else
            echo "has-files=false" >> $GITHUB_OUTPUT
          fi
      - name: Upload built libs and cache
        if: steps.check-cache.outputs.has-files == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: zephyr-cache-${{ matrix.os }}
          path: ${{ env.ZEPHYR_CACHE }}
          retention-days: 7
          include-hidden-files: true
      - name: Zephyr Preview Environments
        # Run this only once per matrix build to avoid duplicate PR comments.
        if: runner.os == 'Linux'
        uses: ZephyrCloudIO/zephyr-preview-environment-action@44869db3cc99c42340f4469005ce837dd5248848 # main
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # We need to fetch all branches and commits so that Nx affected has a base to compare against.
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - uses: nrwl/nx-set-shas@3e9ad7370203c1e93d109be57f3b72eb0eb511b1 # v4
        with:
          main-branch-name: main
      - name: run lint
        run: pnpm nx affected -t lint

  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # We need to fetch all branches and commits so that Nx affected has a base to compare against.
          fetch-depth: 0
      - uses: ./.github/actions/setup
        with:
          os: ${{ matrix.os }}
      - uses: nrwl/nx-set-shas@3e9ad7370203c1e93d109be57f3b72eb0eb511b1 # v4
        with:
          main-branch-name: main
      - name: run test
        env:
          ZE_IS_PREVIEW: true
          ZE_API: ${{ vars.ZE_API_DEV }}
          ZE_API_GATE: ${{ vars.ZE_API_GATE_DEV }}
          ZE_SECRET_TOKEN: ${{ secrets.ZE_SECRET_TOKEN }}
        run: pnpm nx affected -t test --outputStyle=stream

  e2e-test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    name: End-to-end test of examples
    needs: build
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup
        with:
          os: ${{ matrix.os }}
      - uses: nrwl/nx-set-shas@3e9ad7370203c1e93d109be57f3b72eb0eb511b1 # v4
        with:
          main-branch-name: main
      - name: Set ZEPHYR_CACHE
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            echo "ZEPHYR_CACHE=$USERPROFILE\\.zephyr" >> $GITHUB_ENV
          else
            echo "ZEPHYR_CACHE=$HOME/.zephyr" >> $GITHUB_ENV
          fi
      - name: Download zephyr cache
        id: download-zephyr-cache
        continue-on-error: true
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: zephyr-cache-${{ matrix.os }}
          path: ${{ env.ZEPHYR_CACHE }}
      - name: Check if cache has files
        id: check-cache
        shell: bash
        run: |
          if [ -d "${{ env.ZEPHYR_CACHE }}" ] && [ "$(ls -A "${{ env.ZEPHYR_CACHE }}" 2>/dev/null)" ]; then
            echo "has-files=true" >> $GITHUB_OUTPUT
          else
            echo "has-files=false" >> $GITHUB_OUTPUT
          fi
      - name: Skip e2e when no cache exists for this OS
        if: steps.check-cache.outputs.has-files != 'true'
        run: echo "No Zephyr cache artifact for ${{ matrix.os }}; skipping e2e examples test."
      - name: Run e2e examples test
        if: steps.check-cache.outputs.has-files == 'true'
        run: pnpm nx run e2e-deployment:e2e-test --passWithNoTests --skipRemoteCache --outputStyle=stream
