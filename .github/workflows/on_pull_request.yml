name: On Pull Request
on:
  pull_request:
  workflow_dispatch:
    inputs:
      branch:
        description: on the main branch
        required: true
        default: 'main'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  ZE_FAIL_BUILD: true
  TURBO_TELEMETRY_DISABLED: 1
  TURBO_CACHE: remote:rw
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_SCM_BASE: ${{ github.event.pull_request.base.sha || 'origin/main' }}
  TURBO_SCM_HEAD: ${{ github.sha }}

jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
        with:
          # We need full history so Turbo affected can diff against the base commit.
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - name: run build libs
        env:
          ZE_IS_PREVIEW: true
          ZE_API: ${{ vars.ZE_API_DEV }}
          ZE_API_GATE: ${{ vars.ZE_API_GATE_DEV }}
          ZE_SECRET_TOKEN: ${{ secrets.ZE_SECRET_TOKEN }}
        run: pnpm build
      - name: run build affected
        env:
          ZE_IS_PREVIEW: true
          ZE_API: ${{ vars.ZE_API_DEV }}
          ZE_API_GATE: ${{ vars.ZE_API_GATE_DEV }}
          ZE_SECRET_TOKEN: ${{ secrets.ZE_SECRET_TOKEN }}
        run: pnpm exec turbo build --affected --filter='./libs/**'
      - name: Set ZEPHYR_CACHE
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            echo "ZEPHYR_CACHE=$USERPROFILE\\.zephyr" >> $GITHUB_ENV
          else
            echo "ZEPHYR_CACHE=$HOME/.zephyr" >> $GITHUB_ENV
          fi
      - name: Determine affected examples
        id: affected-examples
        shell: bash
        run: |
          pnpm exec turbo ls --affected --filter='./examples/**' --output=json > "$RUNNER_TEMP/affected-examples.json"
          node -e "const fs=require('node:fs');const path=require('node:path');const data=JSON.parse(fs.readFileSync(path.join(process.env.RUNNER_TEMP,'affected-examples.json'),'utf8'));const items=(data.packages?.items??data.items??[]).map((pkg)=>pkg.name).filter((name)=>name&&name!=='zephyr-cli-test');fs.appendFileSync(process.env.GITHUB_OUTPUT, 'has-targets='+(items.length>0)+'\n');fs.appendFileSync(process.env.GITHUB_OUTPUT, 'targets='+items.join(' ')+'\n');"
      - name: Build examples for e2e cache
        if: steps.affected-examples.outputs.has-targets == 'true'
        env:
          ZE_IS_PREVIEW: true
          ZE_API: ${{ vars.ZE_API_DEV }}
          ZE_API_GATE: ${{ vars.ZE_API_GATE_DEV }}
          ZE_SECRET_TOKEN: ${{ secrets.ZE_SECRET_TOKEN }}
        run: pnpm exec turbo build --affected --filter='./examples/**' --filter='!zephyr-cli-test' --force
      - name: Check if e2e cache has files
        id: check-cache
        shell: bash
        run: |
          if [ -d "${{ env.ZEPHYR_CACHE }}" ] && [ "$(ls -A "${{ env.ZEPHYR_CACHE }}" 2>/dev/null)" ]; then
            echo "has-files=true" >> $GITHUB_OUTPUT
          else
            echo "has-files=false" >> $GITHUB_OUTPUT
          fi
      - name: Require Zephyr cache
        if: steps.affected-examples.outputs.has-targets == 'true' && steps.check-cache.outputs.has-files != 'true'
        shell: bash
        run: |
          echo "Zephyr cache was not produced for affected examples: ${{ steps.affected-examples.outputs.targets }}"
          exit 1
      - name: Upload built libs and cache
        if: steps.check-cache.outputs.has-files == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: zephyr-cache-${{ matrix.os }}
          path: ${{ env.ZEPHYR_CACHE }}
          retention-days: 7
          include-hidden-files: true

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          # We need full history so Turbo affected can diff against the base commit.
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - name: run format check
        run: pnpm format:check
      - name: run lint
        run: pnpm exec turbo lint --affected

  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
        with:
          # We need full history so Turbo affected can diff against the base commit.
          fetch-depth: 0
      - uses: ./.github/actions/setup
        with:
          os: ${{ matrix.os }}
      - name: run test
        env:
          ZE_IS_PREVIEW: true
          ZE_API: ${{ vars.ZE_API_DEV }}
          ZE_API_GATE: ${{ vars.ZE_API_GATE_DEV }}
          ZE_SECRET_TOKEN: ${{ secrets.ZE_SECRET_TOKEN }}
        run: pnpm exec turbo test --affected --filter='!e2e-deployment'

  e2e-test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    name: End-to-end test of examples
    needs: build
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup
        with:
          os: ${{ matrix.os }}
      - name: Set ZEPHYR_CACHE
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            echo "ZEPHYR_CACHE=$USERPROFILE\\.zephyr" >> $GITHUB_ENV
          else
            echo "ZEPHYR_CACHE=$HOME/.zephyr" >> $GITHUB_ENV
          fi
      - name: Determine affected examples
        id: affected-examples
        shell: bash
        run: |
          pnpm exec turbo ls --affected --filter='./examples/**' --output=json > "$RUNNER_TEMP/affected-examples.json"
          node -e "const fs=require('node:fs');const path=require('node:path');const data=JSON.parse(fs.readFileSync(path.join(process.env.RUNNER_TEMP,'affected-examples.json'),'utf8'));const items=(data.packages?.items??data.items??[]).map((pkg)=>pkg.name).filter((name)=>name&&name!=='zephyr-cli-test');fs.appendFileSync(process.env.GITHUB_OUTPUT, 'has-targets='+(items.length>0)+'\n');fs.appendFileSync(process.env.GITHUB_OUTPUT, 'targets='+items.join(' ')+'\n');"
      - name: Download zephyr cache
        if: steps.affected-examples.outputs.has-targets == 'true'
        uses: actions/download-artifact@v4
        with:
          name: zephyr-cache-${{ matrix.os }}
          path: ${{ env.ZEPHYR_CACHE }}
      - name: Run e2e examples test
        run: pnpm test:examples
